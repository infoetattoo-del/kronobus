<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Kronobus">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#1b2cc1">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='115' fill='%231b2cc1'/%3E%3Ctext x='256' y='370' text-anchor='middle' font-family='-apple-system,sans-serif' font-size='340' font-weight='900' font-style='italic' fill='white'%3EK%3C/text%3E%3C/svg%3E">
<title>Kronobus</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
html,body{height:100%;background:#f5f5f7;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif}
body{display:flex;align-items:flex-start;justify-content:center;min-height:100vh}
.app{width:100%;max-width:390px;background:#fff;min-height:100vh;padding:env(safe-area-inset-top,56px) 20px 0;position:relative;margin:0 auto}
.screen-pad{height:calc(env(safe-area-inset-bottom,0px) + 90px)}
.screen-pad-xl{height:calc(env(safe-area-inset-bottom,0px) + 320px)}

/* NAV */
.nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;padding-top:8px}
.nav-btn{background:none;border:none;font-size:28px;cursor:pointer;color:#1b2cc1;padding:4px 10px;border-radius:8px;font-family:inherit;line-height:1}
.nav-btn:active{opacity:.5}
.nav-title{font-size:17px;font-weight:600;color:#1d1d1f;letter-spacing:-.3px;text-align:center;flex:1}

/* BOTTOM TAB BAR */
.tabbar{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:390px;background:rgba(255,255,255,.92);border-top:0.5px solid #c8c8d0;display:flex;align-items:stretch;z-index:500;padding-bottom:env(safe-area-inset-bottom,0px);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.tbtab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;border:none;background:none;cursor:pointer;font-family:inherit;gap:4px;min-height:60px}
.tbtab:active{opacity:.6}
.tb-ico{width:30px;height:30px;display:flex;align-items:center;justify-content:center}
.tb-lbl{font-size:10px;font-weight:500;color:#8e8e93;letter-spacing:-.1px}
.tbtab.on .tb-lbl{color:#1b2cc1;font-weight:700}
.tb-svg{width:28px;height:28px;stroke:#8e8e93;fill:none;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tbtab.on .tb-svg{stroke:#1b2cc1}
.tb-svg-fill{width:28px;height:28px;fill:#8e8e93}
.tbtab.on .tb-svg-fill{fill:#1b2cc1}

/* SCREENS */
.screen{display:none}.screen.on{display:block}

/* DAY HEADER */
.day-hdr{text-align:center;margin-bottom:18px;position:relative}
.day-illus{width:100%;height:160px;margin-bottom:0;border-radius:20px;overflow:hidden;position:relative}
.day-illus img{width:100%;height:100%;object-fit:cover;object-position:center 40%}
.day-date-overlay{position:absolute;bottom:0;left:0;right:0;padding:12px 18px 16px;background:linear-gradient(transparent,rgba(0,0,0,.4))}
.day-big{font-size:110px;font-weight:800;line-height:1;color:#fff;letter-spacing:-4px;text-shadow:0 2px 10px rgba(0,0,0,.25)}
.day-month{font-size:16px;font-weight:600;color:rgba(255,255,255,.9);letter-spacing:-.2px;margin-top:-4px}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;margin-top:8px}
.badge-we{background:#FF3B3015;color:#b91c1c}
.badge-night{background:#5856D615;color:#3730a3;margin-left:6px}

/* CARDS — couleurs kawaii pastels */
.card{border-radius:16px;padding:16px;margin-bottom:10px;position:relative;border:1.5px solid transparent}
.card-amp-0{background:#eef1ff;border-color:#c8d0f5}
.card-amp-1{background:#fff0f5;border-color:#f5c8d8}
.card-amp-2{background:#f0fff4;border-color:#b8e8c8}
.card-amp-3{background:#fffbf0;border-color:#f5e4b0}
.card-amp-4{background:#f5f0ff;border-color:#d8c8f5}
.card-lbl{font-size:10px;color:#48484a;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:12px}

/* TIME BLOCKS */
.trow{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.tblk{flex:1;background:rgba(255,255,255,.65);border-radius:12px;padding:12px;text-align:center;cursor:pointer;border:1.5px solid rgba(255,255,255,.9);transition:all .15s}
.tblk:active{border-color:#1b2cc1;background:#eaecfb}
.tblk-lbl{font-size:10px;color:#3a3a3c;margin-bottom:4px;font-weight:700;letter-spacing:.5px}
.tblk-val{font-size:22px;font-weight:300;color:#1d1d1f;letter-spacing:-.5px}
.tblk-val.emp{color:#adadb8;font-size:16px;font-weight:400}
.arrow{color:#adadb8;font-size:14px}

/* DURATION CHIP */
.dur-chip{display:inline-flex;align-items:center;gap:4px;background:#f0f0f5;border-radius:20px;padding:5px 12px;font-size:12px;color:#3a3a3c;border:1px solid #dcdce4}
.dur-chip b{font-weight:700;color:#1d1d1f}

/* DELETE / DOTS */
.del-btn{position:absolute;top:13px;right:13px;background:none;border:none;cursor:pointer;color:#adadb8;font-size:22px;padding:0 4px;line-height:1;font-family:inherit}
.del-btn:active{color:#FF3B30}
.dots-btn{background:none;border:none;cursor:pointer;color:#adadb8;font-size:22px;padding:4px 6px;line-height:1;font-family:inherit;border-radius:8px;letter-spacing:2px}
.dots-btn:active{background:#f0f0f5}

/* PUNCH BUTTONS */
.pbtn{width:100%;padding:16px;border-radius:14px;border:none;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;letter-spacing:-.2px}
.pbtn:active{opacity:.8;transform:scale(.98)}
.pin{background:#1b2cc1;color:#fff}
.pout{background:#34C759;color:#fff}
.pdone{background:#f0f0f5;color:#48484a;border:1.5px solid #dcdce4;font-size:14px;font-weight:600}

/* ADD BUTTON */
.add-btn{display:flex;align-items:center;gap:8px;padding:10px 0;cursor:pointer;color:#1b2cc1;font-size:14px;font-weight:600;border:none;background:none;font-family:inherit}
.add-btn:active{opacity:.55}

/* TOTAL CARD */
.total-card{background:#f5f5f7;border:1.5px solid #dcdce4;border-radius:16px;padding:16px;margin-bottom:10px}
.total-num{font-size:36px;font-weight:600;color:#1d1d1f;letter-spacing:-1px}

/* SECTION LABEL */
.sec-lbl{font-size:12px;font-weight:700;color:#3a3a3c;margin-bottom:6px;margin-top:16px;letter-spacing:-.1px}

/* NOTE INPUT */
.note-inp{width:100%;border:1.5px solid #c8c8d0;border-radius:12px;padding:10px 13px;font-size:14px;font-family:inherit;background:#fff;color:#1d1d1f;resize:none}
.note-inp:focus{outline:none;border-color:#1b2cc1}
.note-inp::placeholder{color:#adadb8}

/* PHOTO BUTTON */
.photo-btn{display:flex;align-items:center;gap:12px;width:100%;padding:14px 16px;border-radius:14px;border:1.5px dashed #c0c0ca;background:#fff;cursor:pointer;font-family:inherit;margin-bottom:4px}
.photo-btn:active{background:#f5f5f7}
.photo-btn-txt{text-align:left}
.photo-btn-title{font-size:14px;font-weight:600;color:#1d1d1f}
.photo-btn-sub{font-size:12px;color:#6e6e73;margin-top:2px}
.photo-ico{width:42px;height:42px;border-radius:11px;background:#f0f0f5;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* PHOTO GRID */
.photos-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.photo-thumb{position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;cursor:pointer;border:1px solid #dcdce4}
.photo-thumb img{width:100%;height:100%;object-fit:cover}
.photo-thumb-bar{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,.52);padding:4px 5px 5px}
.photo-thumb-time{font-size:9px;color:#fff;font-weight:600;letter-spacing:-.1px}
.photo-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.48);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:14px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:inherit}
.photo-del:active{background:rgba(200,0,0,.7)}

/* STATS */
.stat-row{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:10px}
.stat{background:#f5f5f7;border-radius:12px;padding:13px 8px;text-align:center;border:1px solid #dcdce4}
.stat-v{font-size:20px;font-weight:300;color:#1d1d1f;letter-spacing:-.5px}
.stat-l{font-size:10px;color:#48484a;margin-top:3px;font-weight:700;letter-spacing:.2px}

/* WEEK VIEW — kawaii pastel colors */
.week-day-row{display:flex;align-items:center;padding:14px 16px;border-radius:16px;margin-bottom:8px;cursor:pointer;border:1.5px solid transparent}
.week-day-row:active{opacity:.85}
.week-day-row:nth-child(1){background:#eef1ff;border-color:#c8d0f5}
.week-day-row:nth-child(2){background:#fff0f5;border-color:#f5c8d8}
.week-day-row:nth-child(3){background:#f0fff4;border-color:#b8e8c8}
.week-day-row:nth-child(4){background:#fffbf0;border-color:#f5e4b0}
.week-day-row:nth-child(5){background:#f5f0ff;border-color:#d8c8f5}
.week-day-row:nth-child(6){background:#f0feff;border-color:#b0e4ec}
.week-day-row:nth-child(7){background:#fff5f0;border-color:#f5d0c0}
.week-day-row.today-row{border-color:#1b2cc1 !important;background:#eef1ff !important;border-width:2px !important}
.week-day-row.we-row{border-color:#FF3B3050 !important}
.wdr-left{flex:1}
.wdr-name{font-size:15px;font-weight:700;color:#1d1d1f}
.wdr-date{font-size:12px;color:#6e6e73;margin-top:1px}
.wdr-right{text-align:right}
.wdr-total{font-size:20px;font-weight:600;color:#1d1d1f;letter-spacing:-.5px}
.wdr-total.empty{color:#d0d0d8;font-weight:400;font-size:16px}
.wdr-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;margin-top:3px;display:inline-block}
.wdr-badge.we{background:#FF3B3015;color:#b91c1c}
.wdr-badge.night{background:#5856D615;color:#3730a3}
.week-total-card{background:#1b2cc1;border-radius:16px;padding:16px 20px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.wtc-lbl{font-size:12px;font-weight:600;color:rgba(255,255,255,.7);letter-spacing:.3px;text-transform:uppercase}
.wtc-val{font-size:28px;font-weight:700;color:#fff;letter-spacing:-1px}

/* MONTH CALENDAR — bigger, kawaii */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.dlbl{text-align:center;font-size:12px;color:#48484a;padding:7px 0;font-weight:700;letter-spacing:.2px}
.cday{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;cursor:pointer;gap:3px}
.cday:active{opacity:.7}
.cdn{font-size:16px;font-weight:500;color:#1d1d1f}
.cday.today .cdn{background:#1b2cc1;color:#fff;width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px}
.cday.om .cdn{color:#c8c8d4}
.cday.we-day:not(.today) .cdn{color:#c0392b}
/* kawaii pastel backgrounds per day of week */
.cday-0{background:#fff5f0}.cday-1{background:#eef1ff}.cday-2{background:#fff0f5}.cday-3{background:#f0fff4}.cday-4{background:#fffbf0}.cday-5{background:#f5f0ff}.cday-6{background:#f0feff}
.cdot{width:6px;height:6px;border-radius:50%}
.d-full{background:#1b2cc1}.d-we{background:#FF3B30}.d-night{background:#5856D6}
.legend{display:flex;gap:14px;margin-top:10px;flex-wrap:wrap}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:#3a3a3c}
.leg-dot{width:7px;height:7px;border-radius:50%}

/* YEAR */
.ygrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mmth{border-radius:16px;padding:14px;cursor:pointer;border:1.5px solid transparent}
.mmth:active{opacity:.8}
.mmth:nth-child(1){background:#eef1ff;border-color:#c8d0f5}
.mmth:nth-child(2){background:#fff0f5;border-color:#f5c8d8}
.mmth:nth-child(3){background:#f0fff4;border-color:#b8e8c8}
.mmth:nth-child(4){background:#fffbf0;border-color:#f5e4b0}
.mmth:nth-child(5){background:#f5f0ff;border-color:#d8c8f5}
.mmth:nth-child(6){background:#f0feff;border-color:#b0e4ec}
.mmth:nth-child(7){background:#fff5f0;border-color:#f5d0c0}
.mmth:nth-child(8){background:#eef1ff;border-color:#c8d0f5}
.mmth:nth-child(9){background:#fff0f5;border-color:#f5c8d8}
.mmth:nth-child(10){background:#f0fff4;border-color:#b8e8c8}
.mmth:nth-child(11){background:#fffbf0;border-color:#f5e4b0}
.mmth:nth-child(12){background:#f5f0ff;border-color:#d8c8f5}
.mm-title{font-size:14px;font-weight:700;margin-bottom:9px;color:#1d1d1f}
.mmgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mc{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center}
.mc-w{background:#1b2cc130}.mc-we{background:#FF3B3025}.mc-t{background:#1b2cc1}.mc-n{background:#5856D625}
.mn{font-size:8px;color:#6e6e73;font-weight:500}

/* REPORT */
.rep-card{background:#fff;border:1.5px solid #c8c8d0;border-radius:16px;padding:16px;margin-bottom:10px}
.rep-title{font-size:14px;font-weight:700;margin-bottom:12px;color:#1d1d1f;letter-spacing:-.2px}
.rep-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0f0f5;font-size:13px}
.rep-row:last-child{border-bottom:none}
.rep-key{color:#3a3a3c;font-weight:500}
.rep-val{font-weight:700;color:#1d1d1f}
.rep-val.we{color:#b91c1c}.rep-val.night{color:#3730a3}.rep-val.ok{color:#15803d}
.bar-wrap{margin-top:8px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.bar-lbl{width:28px;text-align:right;font-size:11px;color:#6e6e73;font-weight:600}
.bar-bg{flex:1;background:#f0f0f5;border-radius:4px;height:18px;overflow:hidden;border:1px solid #dcdce4}
.bar-fill{height:100%;border-radius:3px;background:#1b2cc1}
.bar-val{min-width:36px;font-size:11px;color:#3a3a3c;text-align:right;font-weight:500}

/* MODAL */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:1000;align-items:flex-end;justify-content:center}
.modal-ov.open{display:flex}
.msheet{background:#fff;border-radius:22px 22px 0 0;width:100%;max-width:390px;padding:16px 16px 20px;border-top:1px solid #dcdce4;margin-bottom:calc(env(safe-area-inset-bottom,0px) + 65px)}
.mhandle{width:36px;height:4px;background:#c8c8d0;border-radius:2px;margin:0 auto 16px}
.mtitle{font-size:16px;font-weight:700;text-align:center;margin-bottom:16px;color:#1d1d1f;letter-spacing:-.3px}

/* TIME WHEEL */
.wheel-wrap{display:flex;align-items:center;justify-content:center}
.wcol-wrap{position:relative;width:90px;height:164px;overflow:hidden}
.wheel-hl{position:absolute;top:56px;left:6px;right:6px;height:52px;background:#f0f0f5;border-radius:10px;border:1px solid #dcdce4;pointer-events:none;z-index:2}
.wcol{width:100%;height:100%;overflow-y:scroll;overflow-x:hidden;scroll-snap-type:y mandatory;scrollbar-width:none;position:relative;z-index:3}
.wcol::-webkit-scrollbar{display:none}
.wi{height:52px;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:300;color:#adadb8;scroll-snap-align:center;letter-spacing:-.5px}
.wi.sel{color:#1d1d1f;font-size:28px;font-weight:400}
.wsep{font-size:28px;font-weight:200;color:#1d1d1f;padding:0 2px}
.mbtns{display:flex;gap:8px;margin-top:16px}
.mcancel{flex:1;padding:14px;border-radius:13px;border:1.5px solid #c8c8d0;background:#f5f5f7;font-size:15px;cursor:pointer;font-family:inherit;color:#1d1d1f;font-weight:600}
.mcancel:active{opacity:.7}
.mconfirm{flex:1;padding:14px;border-radius:13px;border:none;background:#1b2cc1;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
.mconfirm:active{opacity:.8}

/* EXPORT */
.exp-opts{display:flex;flex-direction:column;gap:8px;margin-bottom:10px}
.exp-btn{padding:14px;border-radius:13px;border:1.5px solid #c8c8d0;background:#f5f5f7;cursor:pointer;font-family:inherit;color:#1d1d1f;text-align:left;display:flex;align-items:center;gap:12px;font-weight:600;font-size:14px}
.exp-btn:active{background:#e8e8ed}
.eico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.exp-desc{font-size:11px;color:#6e6e73;margin-top:2px;font-weight:400}

/* PHOTO VIEWER */
.photo-viewer img{width:100%;border-radius:12px;max-height:55vh;object-fit:contain}
.photo-meta{margin-top:10px;font-size:13px;color:#3a3a3c;font-weight:500;text-align:center}
.photo-note-inp{width:100%;margin-top:10px;border:1.5px solid #c8c8d0;border-radius:12px;padding:10px 13px;font-size:14px;font-family:inherit;background:#fff;color:#1d1d1f;resize:none}
.photo-note-inp:focus{outline:none;border-color:#1b2cc1}
.photo-note-inp::placeholder{color:#adadb8}
.photo-action-row{display:flex;gap:8px;margin-top:12px}
.photo-dl-btn{flex:1;padding:13px;border-radius:12px;border:none;background:#1b2cc1;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.photo-dl-btn:active{opacity:.8}
.photo-close-btn{flex:1;padding:13px;border-radius:12px;border:1.5px solid #c8c8d0;background:#f5f5f7;color:#1d1d1f;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}

/* TOAST */
.toast{position:fixed;top:calc(env(safe-area-inset-top,44px)+10px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.76);color:#fff;font-size:13px;font-weight:600;padding:9px 20px;border-radius:20px;z-index:3000;opacity:0;transition:opacity .25s;white-space:nowrap;pointer-events:none}
.toast.show{opacity:1}

/* SPLASH */
.splash{position:fixed;inset:0;background:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity .6s ease,visibility .6s ease}
.splash.hide{opacity:0;visibility:hidden;pointer-events:none}
.splash-letters{display:flex;align-items:center;justify-content:center;gap:0}
.splash-letter{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;font-size:52px;font-weight:900;font-style:italic;color:#1b2cc1;opacity:0;transform:scale(.6) translateY(12px);animation:letterPop .4s cubic-bezier(.22,1,.36,1) forwards;letter-spacing:-1px}
@keyframes letterPop{0%{opacity:0;transform:scale(.6) translateY(12px)}60%{opacity:1;transform:scale(1.08) translateY(-3px)}100%{opacity:1;transform:scale(1) translateY(0)}}
.splash-sub{font-size:12px;font-weight:500;color:#adadb8;letter-spacing:3px;text-transform:uppercase;opacity:0;animation:subFade .5s ease forwards 1.4s;margin-top:12px}
@keyframes subFade{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
#camInput{display:none}
</style>
</head>
<body>

<div class="toast" id="toast"></div>
<div class="splash" id="splash"><div class="splash-letters"><span class="splash-letter" style="animation-delay:0s">K</span><span class="splash-letter" style="animation-delay:0.1s">R</span><span class="splash-letter" style="animation-delay:0.2s">O</span><span class="splash-letter" style="animation-delay:0.3s">N</span><span class="splash-letter" style="animation-delay:0.4s">O</span><span class="splash-letter" style="animation-delay:0.5s">B</span><span class="splash-letter" style="animation-delay:0.6s">U</span><span class="splash-letter" style="animation-delay:0.7s">S</span></div><div class="splash-sub">Gestion des horaires</div></div></div>
<input type="file" id="camInput" accept="image/*" capture="environment">

<script>
var SK='bushoraires_v2';
var MO=['Janvier','F\u00e9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00fbt','Septembre','Octobre','Novembre','D\u00e9cembre'];
var DS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
var DL=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
var today=new Date(),cur=new Date(today),view='day',data={},modalCb=null,wH=8,wM=0,camKey=null;

function saveData(){try{localStorage.setItem(SK,JSON.stringify(data));showToast('Sauvegard\u00e9 \u2713',1400);}catch(e){}}
function loadData(){try{var s=localStorage.getItem(SK);if(s)data=JSON.parse(s);}catch(e){data={};}}
function showToast(msg,dur){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},dur||1400);}

function dk(d){return d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();}
function ft(h,m){return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');}
function pt(s){if(!s)return null;var p=s.split(':');return{h:+p[0],m:+p[1]};}
function calcDur(s,e){if(!s||!e)return null;var a=pt(s),b=pt(e);var d=(b.h*60+b.m)-(a.h*60+a.m);if(d<0)d+=1440;return d;}
function fmtD(m){if(!m)return '--';var h=Math.floor(m/60),mn=m%60;return mn>0?h+'h'+String(mn).padStart(2,'0'):h+'h';}
function totalDay(key){var d=data[key];if(!d||!d.seg)return 0;return d.seg.reduce(function(s,g){return s+(calcDur(g.s,g.e)||0);},0);}
function getOrCreate(k){if(!data[k])data[k]={seg:[{s:null,e:null}],note:'',photos:[]};if(!data[k].photos)data[k].photos=[];return data[k];}
function isWE(d){return d.getDay()===0||d.getDay()===6;}
function isNight(key){var d=data[key];if(!d||!d.seg)return false;return d.seg.some(function(g){if(!g.e)return false;var t=pt(g.e);return t.h>=22||t.h<5;});}
function getWeek(d){var j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function fmtTS(ts){var d=new Date(ts);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');}
function getMondayOf(d){var day=d.getDay(),diff=d.getDate()-(day===0?6:day-1);return new Date(d.getFullYear(),d.getMonth(),diff);}

function setView(v){
  view=v;
  var tabs=['day','week','month','year','report','export'];
  tabs.forEach(function(t){var el=document.getElementById('tb-'+t);if(el)el.classList.remove('on');});
  var active=document.getElementById('tb-'+v);if(active)active.classList.add('on');
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('on');});
  var sc=document.getElementById('sc-'+v);if(sc)sc.classList.add('on');
  render();
}
function render(){
  if(view==='day')renderDay();
  else if(view==='week')renderWeek();
  else if(view==='month')renderMonth();
  else if(view==='year')renderYear();
  else if(view==='report')renderReport();
  updateNav();
}
function updateNav(){
  var n=document.getElementById('navTitle');
  if(view==='day')n.textContent=DL[cur.getDay()]+' '+cur.getDate()+' '+MO[cur.getMonth()];
  else if(view==='week'){var mo=getMondayOf(cur);n.textContent='Semaine '+getWeek(mo)+' \u2014 '+MO[mo.getMonth()]+' '+mo.getFullYear();}
  else if(view==='month')n.textContent=MO[cur.getMonth()]+' '+cur.getFullYear();
  else if(view==='year')n.textContent=cur.getFullYear();
  else n.textContent=MO[cur.getMonth()]+' '+cur.getFullYear();
}
document.getElementById('prevBtn').addEventListener('click',function(){
  if(view==='day')cur.setDate(cur.getDate()-1);
  else if(view==='week')cur.setDate(cur.getDate()-7);
  else if(view==='month'||view==='report')cur.setMonth(cur.getMonth()-1);
  else cur.setFullYear(cur.getFullYear()-1);
  render();
});
document.getElementById('nextBtn').addEventListener('click',function(){
  if(view==='day')cur.setDate(cur.getDate()+1);
  else if(view==='week')cur.setDate(cur.getDate()+7);
  else if(view==='month'||view==='report')cur.setMonth(cur.getMonth()+1);
  else cur.setFullYear(cur.getFullYear()+1);
  render();
});

function pSt(k){var r=data[k];if(!r||!r.seg||!r.seg[0])return'none';var s=r.seg[0];if(!s.s)return'none';if(!s.e)return'in';return'done';}
function pIn(k){var r=getOrCreate(k),n=new Date();r.seg[0].s=ft(n.getHours(),n.getMinutes());saveData();renderDay();}
function pOut(k){var r=getOrCreate(k),n=new Date();r.seg[0].e=ft(n.getHours(),n.getMinutes());saveData();renderDay();}
function editT(k,i,f){var r=getOrCreate(k);openWheel(f==='s'?'Heure de d\u00e9but':'Heure de fin',r.seg[i][f],function(v){r.seg[i][f]=v;saveData();renderDay();});}
function addSeg(k){getOrCreate(k).seg.push({s:null,e:null});saveData();renderDay();}
function delSeg(k,i){if(!data[k]||data[k].seg.length<=1)return;data[k].seg.splice(i,1);saveData();renderDay();}
function saveNote(k,v){getOrCreate(k).note=v;saveData();}

function triggerCam(key){camKey=key;var i=document.getElementById('camInput');i.value='';i.click();}
document.getElementById('camInput').addEventListener('change',function(){
  var f=this.files[0];if(!f||!camKey)return;
  var r=new FileReader();
  r.onload=function(e){
    var rec=getOrCreate(camKey);
    rec.photos.push({data:e.target.result,ts:Date.now(),note:''});
    saveData();if(view==='day')renderDay();
    showToast('Photo enregistr\u00e9e \u2713',1800);camKey=null;
  };
  r.readAsDataURL(f);
});
function delPhoto(k,i){if(!data[k]||!data[k].photos)return;data[k].photos.splice(i,1);saveData();renderDay();}
function viewPhoto(k,i){
  var p=data[k].photos[i];if(!p)return;
  var b='<div class="photo-viewer"><img src="'+p.data+'" alt="D\u00e9faut">';
  b+='<div class="photo-meta">\ud83d\udcc5 '+fmtTS(p.ts)+'</div>';
  b+='<textarea class="photo-note-inp" rows="2" placeholder="Description du d\u00e9faut..." onchange="savePhotoNote(\''+k+'\','+i+',this.value)">'+(p.note||'')+'</textarea>';
  b+='<div class="photo-action-row"><button class="photo-close-btn" onclick="closeModal()">Fermer</button><button class="photo-dl-btn" onclick="dlPhoto(\''+k+'\','+i+')">T\u00e9l\u00e9charger</button></div>';
  b+='</div>';
  openModal('D\u00e9faut bus',b);
}
function savePhotoNote(k,i,v){if(data[k]&&data[k].photos[i]){data[k].photos[i].note=v;saveData();}}
function dlPhoto(k,i){
  var p=data[k].photos[i];if(!p)return;
  var d=new Date(p.ts);
  var name='bus_defaut_'+d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0')+'_'+String(d.getHours()).padStart(2,'0')+String(d.getMinutes()).padStart(2,'0')+'.jpg';
  var a=document.createElement('a');a.href=p.data;a.download=name;a.click();
  showToast('Photo t\u00e9l\u00e9charg\u00e9e \u2713',1800);
}

function renderWeek(){
  var monday=getMondayOf(cur);
  var totW=0,workedW=0,weHW=0,nightDW=0;
  var h='';
  for(var i=0;i<7;i++){
    var dt=new Date(monday.getFullYear(),monday.getMonth(),monday.getDate()+i);
    var key=dk(dt);var t=totalDay(key);
    var we=isWE(dt);var night=isNight(key);
    var isT=dk(dt)===dk(today);
    if(t>0){totW+=t;workedW++;if(we)weHW+=t;if(night)nightDW++;}
    h+='<div class="week-day-row'+(isT?' today-row':'')+(we?' we-row':'')+'" onclick="gotoDay('+dt.getFullYear()+','+dt.getMonth()+','+dt.getDate()+')">';
    h+='<div class="wdr-left">';
    h+='<div class="wdr-name">'+DL[dt.getDay()]+'</div>';
    h+='<div class="wdr-date">'+dt.getDate()+' '+MO[dt.getMonth()]+'</div>';
    h+='</div>';
    h+='<div class="wdr-right">';
    h+='<div class="wdr-total'+(t?'':' empty')+'">'+(t?fmtD(t):'--')+'</div>';
    if(we||night){h+='<div>';if(we)h+='<span class="wdr-badge we">W-E</span>';if(night)h+='<span class="wdr-badge night">Nuit</span>';h+='</div>';}
    h+='</div>';
    h+='</div>';
  }
  var _nav2=document.getElementById('navTitle').textContent;
  var topCard=getIllusBanner(_nav2)+''<div class="week-total-card"><div><div class="wtc-lbl">Total semaine</div><div class="wtc-val">'+fmtD(totW)+'</div></div>';
  topCard+='<div style="text-align:right"><div class="wtc-lbl">Jours trav.</div><div style="font-size:24px;font-weight:700;color:#fff">'+workedW+'</div></div></div>';
  if(weHW>0){
    topCard+='<div class="stat-row"><div class="stat"><div class="stat-v" style="color:#b91c1c">'+fmtD(weHW)+'</div><div class="stat-l">H. WEEK-END</div></div>';
    topCard+='<div class="stat"><div class="stat-v" style="color:#b91c1c">'+(workedW?fmtD(Math.round(totW/workedW)):'--')+'</div><div class="stat-l">MOY. JOUR</div></div>';
    if(nightDW>0)topCard+='<div class="stat"><div class="stat-v" style="color:#3730a3">'+nightDW+'</div><div class="stat-l">NUITS</div></div>';
    topCard+='</div>';
  } else {
    topCard+='<div class="stat-row"><div class="stat"><div class="stat-v">'+fmtD(workedW>0?Math.round(totW/workedW):0)+'</div><div class="stat-l">MOY. JOUR</div></div>';
    if(nightDW>0)topCard+='<div class="stat"><div class="stat-v" style="color:#3730a3">'+nightDW+'</div><div class="stat-l">NUITS</div></div>';
    topCard+='</div>';
  }
  h+='<div class="screen-pad"></div>';
  document.getElementById('sc-week').innerHTML=topCard+h;
}

function renderMonth(){
  var y=cur.getFullYear(),m=cur.getMonth();
  var first=new Date(y,m,1).getDay(),days=new Date(y,m+1,0).getDate(),prev=new Date(y,m,0).getDate();
  var totM=0,workedD=0,weH=0,weD=0,nightD=0;
  var _nav=document.getElementById('navTitle').textContent;
  var h=getIllusBanner(_nav)+''<div class="mgrid">';
  DS.forEach(function(d){h+='<div class="dlbl">'+d+'</div>';});
  for(var i=0;i<first;i++)h+='<div class="cday om"><span class="cdn">'+(prev-first+i+1)+'</span></div>';
  for(var d=1;d<=days;d++){
    var key=y+'-'+m+'-'+d,t=totalDay(key);
    var dt=new Date(y,m,d),we=isWE(dt),night=isNight(key);
    var isT=y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate();
    if(t>0){totM+=t;workedD++;if(we){weD++;weH+=t;}if(night)nightD++;}
    var dot=t>0?'<div class="cdot '+(we?'d-we':night?'d-night':'d-full')+'"></div>':'';
    h+='<div class="cday cday-'+dt.getDay()+(isT?' today':'')+(we&&!isT?' we-day':'')+(dt.getDay()===0||dt.getDay()===6?' om-we':'')+(data[key]&&totalDay(key)>0?' cday-worked':'')+'" onclick="gotoDay('+y+','+m+','+d+')">';
    h+='<span class="cdn">'+d+'</span>'+dot+'</div>';
  }
  var rem=(7-((first+days)%7))%7;
  for(var i=1;i<=rem;i++)h+='<div class="cday om"><span class="cdn">'+i+'</span></div>';
  h+='</div>';
  var avg=workedD>0?Math.round(totM/workedD):0;
  h+='<div class="stat-row" style="margin-top:16px">';
  h+='<div class="stat"><div class="stat-v">'+fmtD(totM)+'</div><div class="stat-l">TOTAL MOIS</div></div>';
  h+='<div class="stat"><div class="stat-v">'+workedD+'</div><div class="stat-l">JOURS TRAV.</div></div>';
  h+='<div class="stat"><div class="stat-v">'+fmtD(avg)+'</div><div class="stat-l">MOY. JOUR</div></div>';
  h+='</div>';
  if(weD>0||nightD>0){
    h+='<div class="stat-row">';
    if(weD>0){
      h+='<div class="stat"><div class="stat-v" style="color:#b91c1c">'+fmtD(weH)+'</div><div class="stat-l">H. WEEK-END</div></div>';
      h+='<div class="stat"><div class="stat-v" style="color:#b91c1c">'+weD+'</div><div class="stat-l">JOURS W-E</div></div>';
    }
    if(nightD>0)h+='<div class="stat"><div class="stat-v" style="color:#3730a3">'+nightD+'</div><div class="stat-l">NUITS</div></div>';
    h+='</div>';
  }
  h+='<div class="legend"><div class="leg"><div class="leg-dot" style="background:#1b2cc1"></div>Semaine</div><div class="leg"><div class="leg-dot" style="background:#FF3B30"></div>Week-end</div><div class="leg"><div class="leg-dot" style="background:#5856D6"></div>Nuit</div></div>';
  h+='<div class="screen-pad"></div>';
  document.getElementById('sc-month').innerHTML=h;
}

function renderYear(){
  var y=cur.getFullYear();
  var _nav=document.getElementById('navTitle').textContent;
  var h=getIllusBanner(_nav)+''<div class="ygrid">';
  for(var mo=0;mo<12;mo++){
    var days=new Date(y,mo+1,0).getDate(),first=new Date(y,mo,1).getDay();
    h+='<div class="mmth" onclick="gotoMonth('+y+','+mo+')"><div class="mm-title">'+MO[mo]+'</div><div class="mmgrid">';
    DS.forEach(function(){h+='<div class="mc"></div>';});
    for(var i=0;i<first;i++)h+='<div class="mc"></div>';
    for(var d=1;d<=days;d++){
      var key=y+'-'+mo+'-'+d,t=totalDay(key);
      var dt=new Date(y,mo,d),we=isWE(dt),night=isNight(key);
      var isT=y===today.getFullYear()&&mo===today.getMonth()&&d===today.getDate();
      h+='<div class="mc '+(isT?'mc-t':t>0?(we?'mc-we':night?'mc-n':'mc-w'):'')+'"><span class="mn">'+d+'</span></div>';
    }
    h+='</div></div>';
  }
  h+='</div>';
  h+='<div class="screen-pad"></div>';
  document.getElementById('sc-year').innerHTML=h;
}

function renderReport(){
  var y=cur.getFullYear(),m=cur.getMonth(),days=new Date(y,m+1,0).getDate();
  var totM=0,workedD=0,weH=0,weD=0,nightD=0,nightH=0;
  var weekly={};
  for(var d=1;d<=days;d++){
    var key=y+'-'+m+'-'+d,t=totalDay(key);if(!t)continue;
    var dt=new Date(y,m,d),we=isWE(dt),night=isNight(key);
    totM+=t;workedD++;
    var wk=getWeek(dt);weekly[wk]=(weekly[wk]||0)+t;
    if(we){weH+=t;weD++;}if(night){nightD++;nightH+=t;}
  }
  var avg=workedD>0?Math.round(totM/workedD):0;
  var maxW=Math.max.apply(null,Object.values(weekly).concat([1]));
  var _nav=document.getElementById('navTitle').textContent;
  var h=getIllusBanner(_nav)+''<div class="rep-card"><div class="rep-title">Synth\u00e8se mensuelle</div>';
  h+='<div class="rep-row"><span class="rep-key">Total heures</span><span class="rep-val ok">'+fmtD(totM)+'</span></div>';
  h+='<div class="rep-row"><span class="rep-key">Jours travaill\u00e9s</span><span class="rep-val">'+workedD+' j.</span></div>';
  h+='<div class="rep-row"><span class="rep-key">Heures semaine</span><span class="rep-val">'+fmtD(totM-weH)+'</span></div>';
  h+='<div class="rep-row"><span class="rep-key">Moyenne journ\u00e9e</span><span class="rep-val">'+fmtD(avg)+'</span></div>';
  h+='</div>';
  if(weD>0){
    h+='<div class="rep-card"><div class="rep-title">Week-end</div>';
    h+='<div class="rep-row"><span class="rep-key">Jours travaill\u00e9s</span><span class="rep-val we">'+weD+' j.</span></div>';
    h+='<div class="rep-row"><span class="rep-key">Total heures W-E</span><span class="rep-val we">'+fmtD(weH)+'</span></div>';
    h+='<div class="rep-row"><span class="rep-key">Moy. journ\u00e9e W-E</span><span class="rep-val we">'+fmtD(Math.round(weH/weD))+'</span></div>';
    h+='</div>';
  }
  if(nightD>0){
    h+='<div class="rep-card"><div class="rep-title">Service de nuit</div>';
    h+='<div class="rep-row"><span class="rep-key">Jours de nuit</span><span class="rep-val night">'+nightD+' j.</span></div>';
    h+='<div class="rep-row"><span class="rep-key">Total heures nuit</span><span class="rep-val night">'+fmtD(nightH)+'</span></div>';
    h+='</div>';
  }
  var wks=Object.keys(weekly).sort(function(a,b){return+a-+b;});
  if(wks.length>0){
    h+='<div class="rep-card"><div class="rep-title">Par semaine</div><div class="bar-wrap">';
    wks.forEach(function(wk){
      var mins=weekly[wk],pct=Math.round((mins/maxW)*100);
      h+='<div class="bar-row"><div class="bar-lbl">S'+wk+'</div><div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%"></div></div><div class="bar-val">'+fmtD(mins)+'</div></div>';
    });
    h+='</div></div>';
  }
  if(!workedD)h+='<div style="text-align:center;padding:48px 0;color:#adadb8;font-size:14px">Aucune donn\u00e9e ce mois</div>';
  h+='<div class="screen-pad"></div>';
  document.getElementById('sc-report').innerHTML=h;
}

function gotoDay(y,m,d){cur=new Date(y,m,d);setView('day');}
function gotoMonth(y,m){cur=new Date(y,m,1);setView('month');}

function openWheel(title,val,cb){
  var n=new Date();
  wH=val?pt(val).h:n.getHours();
  wM=val?Math.round(pt(val).m/5)*5%60:Math.round(n.getMinutes()/5)*5%60;
  modalCb=cb;
  var b='<div class="wheel-wrap">';
  b+='<div class="wcol-wrap"><div class="wheel-hl"></div><div class="wcol" id="wch"></div></div>';
  b+='<span class="wsep">:</span>';
  b+='<div class="wcol-wrap"><div class="wheel-hl"></div><div class="wcol" id="wcm"></div></div>';
  b+='</div>';
  b+='<div class="mbtns"><button class="mcancel" onclick="closeModal()">Annuler</button><button class="mconfirm" onclick="confirmWheel()">Confirmer</button></div>';
  openModal(title,b);
  setTimeout(buildWheels,60);
}
function buildWheels(){
  var ch=document.getElementById('wch'),cm=document.getElementById('wcm');
  if(!ch||!cm)return;
  ch.innerHTML='<div style="height:56px"></div>';
  for(var i=0;i<24;i++){
    var d=document.createElement('div');d.className='wi'+(i===wH?' sel':'');d.textContent=String(i).padStart(2,'0');
    (function(idx){d.onclick=function(){wH=idx;ch.querySelectorAll('.wi').forEach(function(x,j){x.classList.toggle('sel',j===idx);});ch.scrollTo({top:idx*52,behavior:'smooth'});};})(i);
    ch.appendChild(d);
  }
  var sp=document.createElement('div');sp.style.height='56px';ch.appendChild(sp);
  cm.innerHTML='<div style="height:56px"></div>';
  for(var i=0;i<60;i++){
    var v=i,d=document.createElement('div');d.className='wi'+(v===wM?' sel':'');d.textContent=String(v).padStart(2,'0');
    (function(idx,val){d.onclick=function(){wM=val;cm.querySelectorAll('.wi').forEach(function(x,j){x.classList.toggle('sel',j===idx);});cm.scrollTo({top:idx*52,behavior:'smooth'});};})(i,v);
    cm.appendChild(d);
  }
  var sp2=document.createElement('div');sp2.style.height='56px';cm.appendChild(sp2);
  ch.scrollTo({top:wH*52,behavior:'instant'});
  cm.scrollTo({top:wM*52,behavior:'instant'});
  ch.onscroll=function(){var i=Math.round(ch.scrollTop/52);if(i>=0&&i<24){wH=i;ch.querySelectorAll('.wi').forEach(function(x,j){x.classList.toggle('sel',j===i);});}};
  cm.onscroll=function(){var i=Math.round(cm.scrollTop/52);if(i>=0&&i<60){wM=i;cm.querySelectorAll('.wi').forEach(function(x,j){x.classList.toggle('sel',j===i);});}};
}
function confirmWheel(){if(modalCb)modalCb(ft(wH,wM));closeModal();}

function openModal(title,body){
  document.getElementById('mtitle').textContent=title;
  document.getElementById('mbody').innerHTML=body;
  document.getElementById('modal-ov').classList.add('open');
}
function closeModal(){document.getElementById('modal-ov').classList.remove('open');modalCb=null;}
function ovClick(e){if(e.target===document.getElementById('modal-ov'))closeModal();}

function openExport(){
  var b='<div class="exp-opts">';
  b+='<button class="exp-btn" onclick="exportCSV()"><div class="eico" style="background:#34C75918">&#128202;</div><div><div>CSV / Excel</div><div class="exp-desc">Donn\u00e9es brutes du mois courant</div></div></button>';
  b+='<button class="exp-btn" onclick="exportTXT()"><div class="eico" style="background:#1b2cc112">&#128203;</div><div><div>Rapport texte</div><div class="exp-desc">Synth\u00e8se mensuelle compl\u00e8te</div></div></button>';
  b+='</div><button class="mcancel" style="width:100%" onclick="closeModal()">Annuler</button>';
  openModal('Exporter',b);
}
function exportCSV(){
  var y=cur.getFullYear(),m=cur.getMonth(),days=new Date(y,m+1,0).getDate();
  var csv='Date,Jour,W-E,Nuit,Photos,D\u00e9but,Fin,Dur\u00e9e (min),Total (h),Note\n';
  for(var d=1;d<=days;d++){
    var key=y+'-'+m+'-'+d,rec=data[key];
    var dt=new Date(y,m,d);
    var weS=isWE(dt)?'Oui':'Non',nightS=isNight(key)?'Oui':'Non';
    var pc=rec&&rec.photos?rec.photos.length:0;
    if(rec&&rec.seg){
      rec.seg.forEach(function(s,i){
        var dur=calcDur(s.s,s.e)||0;
        csv+=d+'/'+(m+1)+'/'+y+','+DL[dt.getDay()]+','+weS+','+nightS+','+(i===0?pc:'')+','+(s.s||'')+','+(s.e||'')+','+dur+','+(i===0?fmtD(totalDay(key)):'')+','+(i===0?(rec.note||''): '')+'\n';
      });
    } else {
      csv+=d+'/'+(m+1)+'/'+y+','+DL[dt.getDay()]+','+weS+',Non,0,,,,--,\n';
    }
  }
  dlBlob(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}),'horaires_'+MO[m]+'_'+y+'.csv');
  closeModal();
}
function exportTXT(){
  var y=cur.getFullYear(),m=cur.getMonth(),days=new Date(y,m+1,0).getDate();
  var sep='\u2500'.repeat(42);
  var txt='RAPPORT HORAIRE \u2014 '+MO[m].toUpperCase()+' '+y+'\n'+sep+'\n\n';
  var totM=0,workedD=0,weH=0,weD=0,nightD=0,nightH=0;
  for(var d=1;d<=days;d++){
    var key=y+'-'+m+'-'+d,t=totalDay(key);if(!t)continue;
    var dt=new Date(y,m,d),we=isWE(dt),night=isNight(key);
    totM+=t;workedD++;if(we){weH+=t;weD++;}if(night){nightD++;nightH+=t;}
    var rec=data[key],pc=rec&&rec.photos?rec.photos.length:0;
    txt+=String(d).padStart(2,'0')+'/'+(m+1)+'  '+DL[dt.getDay()].substring(0,3).toUpperCase()+(we?' [WE]':'')+(night?' [NUIT]':'')+(pc>0?' ['+pc+' photo'+(pc>1?'s':'')+']':'')+'\n';
    if(rec&&rec.seg)rec.seg.forEach(function(s,i){if(s.s||s.e)txt+='  Amplitude '+(i+1)+' : '+(s.s||'?')+' \u2192 '+(s.e||'?')+'  ('+fmtD(calcDur(s.s,s.e))+')\n';});
    txt+='  Total : '+fmtD(t);if(rec&&rec.note)txt+='  |  '+rec.note;txt+='\n\n';
  }
  txt+=sep+'\nSYNTH\u00c8SE\n'+sep+'\n';
  txt+='Total heures      : '+fmtD(totM)+'\n';
  txt+='Jours travaill\u00e9s  : '+workedD+'\n';
  txt+='Heures semaine    : '+fmtD(totM-weH)+'\n';
  if(weD>0)txt+='Heures week-end   : '+fmtD(weH)+' ('+weD+' jours)\n';
  if(nightD>0)txt+='Heures nuit       : '+fmtD(nightH)+' ('+nightD+' jours)\n';
  txt+='Moy. journ\u00e9e      : '+fmtD(workedD>0?Math.round(totM/workedD):0)+'\n';
  dlBlob(new Blob([txt],{type:'text/plain;charset=utf-8;'}),'rapport_'+MO[m]+'_'+y+'.txt');
  closeModal();
}
function dlBlob(blob,name){var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();}

function showSegMenu(k,i){
  var rec=data[k];if(!rec)return;
  var isOnly=rec.seg.length===1;
  var b='<div style="display:flex;flex-direction:column;gap:8px">';
  b+='<button class="exp-btn" onclick="resetSeg(\''+k+'\','+i+');closeModal()"><div class="eico" style="background:#FF3B3015;font-size:16px">&#128465;</div><div><div>Effacer les heures</div><div class="exp-desc">Remet début et fin à zéro</div></div></button>';
  if(!isOnly)b+='<button class="exp-btn" onclick="delSeg(\''+k+'\','+i+');closeModal()"><div class="eico" style="background:#FF3B3015;font-size:16px">&#10005;</div><div><div style="color:#FF3B30">Supprimer cette amplitude</div><div class="exp-desc">Supprime complètement ce bloc</div></div></button>';
  b+='</div><button class="mcancel" style="width:100%;margin-top:8px" onclick="closeModal()">Annuler</button>';
  openModal('Options amplitude '+(i+1),b);
}
function resetSeg(k,i){if(!data[k]||!data[k].seg[i])return;data[k].seg[i]={s:null,e:null};saveData();renderDay();}
function clearHours(k){if(!data[k])return;data[k].seg=[{s:null,e:null}];data[k].note='';saveData();renderDay();}
loadData();
render();
setTimeout(function(){document.getElementById('splash').classList.add('hide');},2400);

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(function(){
    console.log('Kronobus: mode hors-ligne actif');
  }).catch(function(e){console.log('SW non disponible',e);});
}
</script>
